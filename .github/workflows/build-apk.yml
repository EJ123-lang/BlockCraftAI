name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "App.js"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "app.json"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate native Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Build installable APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk BlockCraftAI-v1.0.1.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockCraftAI-Android-APK
          path: BlockCraftAI-v1.0.1.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
